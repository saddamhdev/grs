<!DOCTYPE html xmlns:th="http://www.thymeleaf.org">
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="viewMeetingsDetailsIncludeStyle" th:remove="tag">
    <div th:replace="fileUpload :: fileUploadIncludeStyle"></div>
    <link href="/assets/global/plugins/bootstrap-sweetalert/sweetalert.css" rel="stylesheet" type="text/css" />
    <link href="/assets/global/plugins/bootstrap-summernote/summernote.css" rel="stylesheet" type="text/css" />
    <style>
        /* Simple table polish without changing theme */
        .table th, .table td { vertical-align: middle !important; }
        .table thead th { white-space: nowrap; }
        .section-title { margin: 20px 0 10px; font-weight: 600; }
    </style>
</div>

<div class="page-content" th:fragment="viewMeetingsDetails">
    <h3 class="page-title" id="addGrievanceTitle" th:text="#{cell.meeting.details.header}"></h3>

    <div class="portlet light bordered">
        <div class="portlet-body form">
            <div class="form-horizontal" role="form" id="addMeetingForm" action="javascript:;" accept-charset="UTF-8">
                <div class="form-body">

                    <!-- Meeting Overview (now a compact table) -->
                    <h4 class="section-title" th:remove="tag" th:utext="#{cell.meeting.details.header}"></h4>
                    <div class="table-responsive">
                        <table class="table table-striped table-bordered">
                            <tbody>
                            <tr>
                                <th style="width: 220px;">
                                    <span th:remove="tag" th:utext="#{cell.meeting.form.subject}"></span>:
                                </th>
                                <td>
                                    <span class="control-label" id="subject"></span>
                                </td>
                            </tr>
                            <tr>
                                <th>
                                    <span th:remove="tag" th:utext="#{cell.meeting.form.deadline}"></span>:
                                </th>
                                <td>
                                    <span class="control-label" id="meetingDate"></span>
                                    <div id="insertDateErrorSpan"></div>
                                </td>
                            </tr>
                            <tr>
                                <th>
                                    <span th:remove="tag" th:utext="#{cell.meeting.details.active}"></span>:
                                </th>
                                <td>
                                    <span class="control-label" id="active"></span>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Grievances (table) -->
                    <h4 class="section-title">
                        <span th:remove="tag" th:utext="#{cell.meeting.details.grievance}"></span>:
                    </h4>
                    <div id="grievanceSelector" class="table-responsive">
                        <table class="table table-hover table-bordered">
                            <thead>
                            <tr>
                                <th>ট্র্যাকিং নং</th>
                                <th>তারিখ</th>
                                <th>বিষয়</th>
                                <th style="width:120px">অ্যাকশন</th>
                            </tr>
                            </thead>
                            <tbody id="grievanceTableBody">
                            <!-- Filled by JS -->
                            </tbody>
                        </table>
                    </div>

                    <!-- Note (shown when inactive) -->
                    <div class="form-group hide" id="noteDiv">
                        <label class="col-md-3 control-label">
                            <span th:remove="tag" th:utext="#{cell.meeting.details.note}"></span>:
                        </label>
                        <div class="col-md-9">
                            <div class="timeline-body-content" id="note"></div>
                        </div>
                    </div>

                    <!-- Files (table; shown when inactive) -->
                    <div class="form-group hide" id="filesDiv">
                        <label class="col-md-3 control-label">
                            <span th:remove="tag" th:utext="#{cell.meeting.details.files}"></span>:
                        </label>
                        <div class="col-md-9">
                            <div id="files" class="table-responsive">
                                <table class="table table-striped table-bordered">
                                    <thead>
                                    <tr>
                                        <th>ফাইল নাম</th>
                                        <th>ধরন</th>
                                        <th style="width:120px">অ্যাকশন</th>
                                    </tr>
                                    </thead>
                                    <tbody id="filesTableBody">
                                    <!-- Filled by JS -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    <!-- /Files -->

                </div>

                <div class="form-actions">
                    <div class="row">
                        <div class="col-md-offset-3 col-md-9">
                            <button type="button" id="submitButton" class="btn green hide"
                                    th:utext="#{cell.meeting.details.submit.button}"
                                    onclick="javascript:showMeetingResolutionModal()"></button>

                            <button type="button" class="btn default"
                                    th:utext="#{cell.meeting.form.cancel.button}"
                                    onclick="window.history.go(-1); return false;"></button>

                            <button type="button" id="deleteButton" class="btn red hide"
                                    th:utext="#{cell.meeting.form.delete.button}"
                                    onclick="javascript:deleteMeeting()"></button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Processing Modal -->
    <div class="modal fade" id="ajaxProcessingModal" tabindex="-1" data-backdrop="static" data-keyboard="false">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-body">
                    <img src="../assets/global/img/loading-spinner-grey.gif" alt="" class="loading">
                    <span th:text="#{processing}">&nbsp;&nbsp;</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Close Meeting Modal -->
    <div id="modalCloseMeeting" class="modal fade bs-modal-lg" tabindex="-1" data-backdrop="static" data-keyboard="false">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-hidden="true"></button>
                    <h4 class="modal-title"><i class="icon-bubble"></i> মিটিং সমাধান </h4>
                </div>
                <div class="modal-body">
                    <div class="form-body">
                        <div class="progress-extended">&nbsp;</div>
                        <div class="form-group">
                            <label class="control-label">মিটিং এর সিদ্ধান্ত বিস্তারিত লিখুন</label>
                            <div class="summernote" id="closeModalNote"></div>
                            <div class="progress-extended">&nbsp;</div>
                            <form id="fileuploadCloseMeeting" action="api/file/upload" method="POST" enctype="multipart/form-data" class="">
                                <div th:replace="fileUpload :: fileUploadHtml"></div>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn green btn-primary btn-action" onclick="closeMeetingWithResolution();">
                        প্রেরণ করুন
                    </button>
                    <button type="button" data-dismiss="modal" class="btn btn-outline dark">বন্ধ করুন</button>
                </div>
            </div>
        </div>
    </div>

    <!-- File Viewer Modal -->
    <div class="modal fade" id="fileViewerModal" tabindex="-1" data-backdrop="static" data-keyboard="false">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-hidden="true"></button>
                </div>
                <div class="modal-body"></div>
                <div class="modal-footer">
                    <button class="btn dark btn-outline" data-dismiss="modal" type="button">বন্ধ করুন</button>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="fileUpload :: fileUploadTemplateScriptGrievanceDetails"></div>
    <div th:replace="fileSettingsInputTemplate :: fileSettingsInputTemplate"></div>
</div>

<div th:fragment="viewMeetingsDetailsIncludeScript" th:remove="tag">
    <div th:replace="fileUpload :: fileUploadIncludeScript"></div>
    <script src="/assets/global/plugins/bootstrap-sweetalert/sweetalert.min.js" type="text/javascript"></script>
    <div th:replace="fileSettingsInputTemplate :: fileSettingsInputTemplateScript"></div>
</div>

<script th:inline="javascript" th:fragment="viewMeetingsDetailsScript">
    function ajaxCall(url, accept, methodType, contentType, postData, onSuccess, onError) {
        $.ajax({
            type: methodType,
            url: url,
            dataType: accept,
            contentType: contentType,
            data: postData,
            success: onSuccess,
            error: onError
        });
    }

    $(document).ready(function () {
        loadDetails();
    });

    function loadDetails() {
        var meetingId = window.location.href.split("=")[1];
        ajaxCall("/api/cell/meeting/" + meetingId, null, "GET", "application/json", null, onSuccessLoad, null);
    }

    function showInProgressModal() {
        toastr.info("প্রিন্ট করার পদ্ধতি নির্মাণাধীন");
    }

    function deleteMeeting() {
        var meetingId = window.location.href.split("=")[1];
        ajaxCall(
            "/api/cell/meeting/" + meetingId,
            null,
            "DELETE",
            "application/json",
            null,
            function (data) {
                toastr.info(data.message);
                window.setTimeout(function () { window.history.go(-1); }, 1000);
            },
            function () { toastr.info("অপসারণ করা যাচ্ছে না"); }
        );
    }

    function detectFileType(url) {
        var u = (url || "").toLowerCase();
        if (u.endsWith(".png/") || u.endsWith(".jpeg/") || u.endsWith(".jpg/") || u.endsWith(".bmp/") || u.endsWith(".gif/")) return "image";
        if (u.endsWith(".pdf/") || u.endsWith(".txt/") || u.endsWith(".xls/") || u.endsWith(".xlsx/") || u.endsWith(".doc/") || u.endsWith(".docx/")) return "document";
        if (u.endsWith(".mp3/")) return "audio";
        if (u.endsWith(".mp4/")) return "video";
        return "file";
    }

    function onSuccessLoad(data) {
        // Overview
        $("#subject").html(data.meeting.subject);
        $("#meetingDate").html(data.meeting.meetingDate);
        $("#active").html(data.meeting.active ? "চলমান " : "সমাপ্ত");

        // If inactive, show note & files
        if (data.meeting.active == false) {
            $("#noteDiv").removeClass("hide");
            $("#filesDiv").removeClass("hide");

            $("#note").html(data.note);

            var $filesTableBody = $("#filesTableBody");
            $filesTableBody.empty();

            if (data.files.length > 0) {
                $.each(data.files, function (key, val) {
                    var value = val.url;
                    var type = detectFileType(value);
                    var attrib = "";
                    if (type === "image") {
                        attrib = 'data-lightbox="' + value + '"';
                    } else if (type === "document") {
                        attrib = 'class="media-embed" onclick="javascript:previewFile(this, event)"';
                    } else if (type === "audio") {
                        attrib = 'class="media-audio" onclick="javascript:previewFile(this, event)"';
                    } else if (type === "video") {
                        attrib = 'class="media-video" onclick="javascript:previewFile(this, event)"';
                    }
                    var fileName = (!val.name || 0 === val.name.length) ? "Untitled File" : val.name;

                    var viewLink =
                        '<a href="' + value + '" ' + attrib + ' data-asset="false">' +
                        (type === "image" ? "View" : "Open") +
                        "</a>";

                    var downloadLink = '<a href="' + value + '" download>Download</a>';

                    var $row = $(
                        "<tr>" +
                        "<td>" + fileName + "</td>" +
                        "<td>" + type + "</td>" +
                        "<td>" + viewLink + " &nbsp;|&nbsp; " + downloadLink + "</td>" +
                        "</tr>"
                    );
                    $filesTableBody.append($row);
                });
            } else {
                // If no files, remove the entire files wrapper as before
                $("#files").remove();
            }

        } else {
            $("#submitButton").removeClass("hide");
            $("#deleteButton").removeClass("hide");
        }

        // Grievances table
        var $gBody = $("#grievanceTableBody");
        $gBody.empty();
        $.each(data.grievances, function (key, val) {
            var dateBangla = (val.dateBangla || "").split(" ")[0];
            var detailsLink = '<a href="/viewGrievances.do?id=' + val.id + '" target="_blank">বিস্তারিত</a>';
            var $row = $(
                "<tr>" +
                "<td>" + val.trackingNumberBangla + "</td>" +
                "<td>" + dateBangla + "</td>" +
                "<td>" + val.subject + "</td>" +
                "<td>" + detailsLink + "</td>" +
                "</tr>"
            );
            $gBody.append($row);
        });
    }

    function showMeetingResolutionModal() { $("#modalCloseMeeting").modal('show'); }
    function hideMeetingResolutionModal() { $("#modalCloseMeeting").modal('hide'); }

    function checkNotAllowedFiles(obj, buttonId) {
        var numberOfDisallowedFiles = $(obj).find("strong.error.label.label-danger").length;
        if (numberOfDisallowedFiles == 1) { $(buttonId).removeAttr('disabled'); }
        else { $(buttonId).attr('disabled', 'disabled'); }
    }

    function closeMeetingWithResolution() {
        var files = [];
        $("tr.template-download.fade.in").find("p.name").each(function () {
            files.push({
                name: $(this).find("input[name='fileNameByUser']").val(),
                url: $(this).find("a").attr("href")
            });
        });

        var opinion = {};
        var bodyContent = $("#closeModalNote").summernote("code");
        opinion['note'] = bodyContent;
        opinion['meetingId'] = window.location.href.split("=")[1];
        opinion['files'] = files;

        var cleanText = $("#closeModalNote").summernote('code').replace(/<\/?[^>]+(>|$)/g, "");
        if (cleanText == "") {
            toastr.error("অনুগ্রহ করে কোন বিষয়ে অনুমতি দিয়েছেন তা লিখুন।");
            return;
        }
        $("#closeModalNote").summernote('reset');
        $("#ajaxProcessingModal").modal('show');
        ajaxCall("api/cell/meeting/close", "json", "POST", "application/json", JSON.stringify(opinion), postSuccess, postFailure);
    }

    function postSuccess(data) {
        $("#ajaxProcessingModal").modal('hide');
        if (data.success) {
            toastr.info(data.message);
            hideMeetingResolutionModal();
            window.setTimeout(function () { window.history.go(-1); }, 1000);
        } else {
            toastr.error(data.message);
        }
    }

    function postFailure(data) {
        toastr.error(data.message);
        $("#submitButton").removeAttr('disabled');
    }

    function previewFile(clickedLink, e) {
        if (e) { e.preventDefault(); }
        var domainURL = "http://" + document.location.host;
        if ($(clickedLink).attr("href").startsWith("http://")) {
            domainURL = "";
        }
        if ($(clickedLink).hasClass("media-embed")) {
            var isEmbed = ($(clickedLink).attr("data-asset") == "true");
            if (isEmbed) {
                $("#fileViewerModal .modal-body").html(
                    '<embed src="' + domainURL + $(clickedLink).attr("href") + '" style="width:100%; height:800px;"></embed>'
                );
            } else {
                $("#fileViewerModal .modal-body").html(
                    '<iframe src="http://docs.google.com/gview?embedded=true&url=' + domainURL + $(clickedLink).attr("href") + '" style="width:100%; height:800px;" frameborder="0"></iframe>'
                );
            }
            $("#fileViewerModal").modal("show");
            return false;
        } else if ($(clickedLink).hasClass("media-audio")) {
            $("#fileViewerModal .modal-body").html(
                '<audio style="width:100%;" controls><source src="' + $(clickedLink).attr("href") + '" type="audio/mpeg">Your browser does not support the audio element.</audio>'
            );
            $("#fileViewerModal").modal("show");
            return false;
        } else if ($(clickedLink).hasClass("media-video")) {
            $("#fileViewerModal .modal-body").html(
                '<video style="width:100%;height:480px;" controls><source src="' + $(clickedLink).attr("href") + '" type="video/mp4">Your browser does not support the video tag.</video>'
            );
            $("#fileViewerModal").modal("show");
            return false;
        } else {
            return true;
        }
    }

    function featureComingSoon() {
        if (languageCode == "en") {
            swal({
                title: "Under construction",
                text: "Sorry, we are currently building this",
                type: "info",
                showCancelButton: false,
                confirmButtonClass: "btn-info",
                confirmButtonText: "OK",
                closeOnConfirm: true
            });
        } else {
            swal({
                title: "নির্মাণাধীন",
                text: "দুঃখিত, এই ফীচারটি এখন নির্মাণাধীন",
                type: "info",
                showCancelButton: false,
                confirmButtonClass: "btn-info",
                confirmButtonText: "বন্ধ করুন",
                closeOnConfirm: true
            });
        }
    }
</script>
</html>
