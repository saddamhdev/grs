        data: postData,
        success: onSuccess,
        error: onError

function onSuccessLoadGrievances(data) {
    const $tbody = $('#grievanceTable tbody');
    $('#grievanceLoading').hide();
    $tbody.empty();

    if (!Array.isArray(data) || data.length === 0) {
        $('#grievanceEmpty').show();
        return;
    }

    const frag = $(document.createDocumentFragment());

    data.forEach(item => {
        const id = item && item.id != null ? String(item.id) : '';
        const tracking = item?.trackingNumberBangla || '';
        const dateBn = item?.dateBangla ? String(item.dateBangla).split(' ')[0] : '';
        const subject = item?.subject || '';
        const statusBn = item?.statusBangla || '';
        const expectedBn = item?.expectedDateOfClosingBangla || '';

        const inputId = `grv_${id}`;

        const $tr = $('<tr/>');

        const $selectTd = $('<td/>', { style: 'text-align:center' }).append(
            $('<input/>', { type: 'checkbox', id: inputId, name: 'grievance[]', value: id })
        );

        const $trackingTd = $('<td/>').text(tracking);
        const $dateTd = $('<td/>').text(dateBn);
        const $subjectTd = $('<td/>').text(subject);
        const $statusTd = $('<td/>').text(statusBn);
        const $expectedTd = $('<td/>').text(expectedBn);

        const $actionTd = $('<td/>').append(
            $('<a/>', {
                href: `/viewGrievances.do?id=${encodeURIComponent(id)}`,
                target: '_blank',
                text: 'বিস্তারিত'
            })
        );

        $tr.append($selectTd, $trackingTd, $dateTd, $subjectTd, $statusTd, $expectedTd, $actionTd);
        frag.append($tr);
    });

    $tbody.append(frag);
    $('#grievanceEmpty').hide();

    // Reset header select-all when data changes
    // $('#grvSelectAllHead').prop('checked', false);
    $('#grvSelectAllHead').prop('checked', false).prop('indeterminate', false).prop('disabled', false);
    updateGrvHeaderState();
}

function updateGrvHeaderState() {
    const $all = $('#grievanceTable tbody input[type=checkbox][name="grievance[]"]');
    const $head = $('#grvSelectAllHead');

    if ($all.length === 0) {
        $head.prop({ checked: false, indeterminate: false }).prop('disabled', true);
        return;
    }

    $head.prop('disabled', false);
    const checked = $all.filter(':checked').length;
    const total = $all.length;

    $head
        .prop('checked', checked === total)
        .prop('indeterminate', checked > 0 && checked < total);
}

// When the header checkbox changes, toggle all rows
$(document).on('change', '#grvSelectAllHead', function () {
    const checked = $(this).is(':checked');
    // If you ever add filtering and want only visible rows:
    // const $targets = $('#grievanceTable tbody tr:visible input[type=checkbox][name="grievance[]"]');
    const $targets = $('#grievanceTable tbody input[type=checkbox][name="grievance[]"]');
    $targets.prop('checked', checked);
    // Once user explicitly clicked header, no indeterminate state
    $(this).prop('indeterminate', false);
});

// When any row checkbox changes, refresh header state
$(document).on('change', '#grievanceTable tbody input[type=checkbox][name="grievance[]"]', function () {
    updateGrvHeaderState();
});


function getMeetingDTO(){
    var meeting = {};
    var array = $("#addMeetingForm :input").serializeArray();
    $.each(array, function() {
        if (this.name != "grievance[]" && this.name != "submissionDate" ){
            meeting[this.name] = this.value || '';
        }
        else if (this.name == "submissionDate"){
            meeting[this.name] = (this.value || '').toEnglishNumber();
        }
    });
    var grievancesIds = [];

    $("input[type=checkbox]:checked").each(function(index) {
        grievancesIds.push($( this ).val());
    });

    meeting["grievanceIds"] = grievancesIds;
    return meeting;
}


function validateForm () {
    var form = $('#addMeetingForm');
    var error = $('.alert-danger', form);
    var success = $('.alert-success', form);
    var requiredText = "";

    if (languageCode == "en") {
        requiredText = "This field is required";
    } else {
        requiredText = "এই তথ্যটি প্রদান করা আবশ্যক";
    }

    form.validate({
        doNotHideMessage: true,
        errorElement: 'span',
        errorClass: 'help-block help-block-error',
        focusInvalid: false,
        rules: {
            subject: {
                required: true
            },
            submissionDate: {
                required: true
            }
        },

        messages: {
            submissionDate: {
                required: requiredText
            },
            subject: {
                required: requiredText
            }
        },

        errorPlacement: function(error, element) {
            if (element.attr("name") == "submissionDate") {
                error.insertAfter("#insertDateErrorSpan");
            } else {
                error.insertAfter(element);
            }
        },

        invalidHandler: function(event, validator) {
            success.hide();
            error.show();
            App.scrollTo(error, -200);
        },

        highlight: function(element) {
            $(element).closest('.form-group').removeClass('has-success').addClass('has-error');
        },

        unhighlight: function(element) {
            $(element).closest('.form-group').removeClass('has-error');
        },

        success: function(label) {
            label.addClass('valid').closest('.form-group').removeClass('has-error').addClass('has-success');
        },

        submitHandler: function(form) {
            success.show();
            error.hide();
        }
    });
    return form;
}

function postMeeting(data) {

    if (form.valid() == false) {
        return;
    }

    $("#submitButton").attr('disabled','disabled');
    window.onbeforeunload = null;

    var meeting = getMeetingDTO();
    if (meeting.grievanceIds.length == 0){
        toastr.error("অভিযোগ বাছাই করুন। ");
        $("#submitButton").removeAttr('disabled');
        return 0;
    }
    var meetingDTO = JSON.stringify(meeting);
    ajaxCall("/api/cell/meeting", "json", "POST", "application/json; charset=utf-8" , meetingDTO, postSuccess, postFailure);
}

function postSuccess(data){
    $("#submitButton").removeAttr('disabled');
    if (data.success){
        toastr.info(data.message);
        $("#submitButton").attr('disabled','disabled');
        window.setTimeout(function() {
                var oldLink = window.location.href;
                oldLink = oldLink.replace("addMeetings.do", "viewMeetings.do");
                window.location.href = oldLink;
            }, 1000);
    } else {
        toastr.error(data.message);
    }
}

function postFailure(data){
    console.log(data);
    toastr.error("Failure");
    $("#submitButton").removeAttr('disabled');
}
